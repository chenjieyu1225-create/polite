<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>超礼貌导师回复生成器</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background: #f6f7f9;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h2 {
      margin-top: 0;
      color: #2d3748;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      resize: none;
    }
    button {
      margin-top: 10px;
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #f7fafc;
      border-radius: 8px;
      min-height: 60px;
      white-space: pre-wrap;
    }
    .copy-btn {
      background: #2d3748;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🧑‍🎓 导师超礼貌回复生成器</h2>
    <textarea id="inputText" placeholder="输入你想改成礼貌版的句子..."></textarea>
    <button id="generateBtn">生成超礼貌回复</button>
    <button class="copy-btn" id="copyBtn">复制结果</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    // 1. 在这里填入你的 OpenAI Key
    const OPENAI_API_KEY = "sk-c4ead8cdf70a4ed5941d9a3680529f84";

    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const inputText = document.getElementById("inputText");
    const result = document.getElementById("result");

    generateBtn.onclick = async () => {
      const text = inputText.value.trim();
      if (!text) return alert("请输入内容");

      generateBtn.disabled = true;
      generateBtn.innerText = "生成中...";
      result.innerText = "";

      try {
       const response = await fetch("https://api.deepseek.com/chat/completions", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${OPENAI_API_KEY}`
  },
  body: JSON.stringify({
    model: "deepseek-chat",
    messages: [
      {
        role: "system",
        content: `你是一个礼貌助手，把用户输入的句子改成对导师/老师用的超礼貌回复。
要求：
1. 必须礼貌、尊敬
2. 简短自然
3. 适合微信发送
4. 只输出改写后的句子，不要解释`
      },
      { role: "user", content: text }
    ],
    temperature: 0.7
  })
});

        const data = await response.json();
        const output = data.choices[0].message.content.trim();
        result.innerText = output;

      } catch (err) {
        result.innerText = "出错了：" + err.message;
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerText = "生成超礼貌回复";
      }
    };

    // 复制功能
    copyBtn.onclick = () => {
      const text = result.innerText;
      if (!text) return;
      navigator.clipboard.writeText(text);
      alert("已复制！");
    };
  </script>
</body>
</html>
